<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="notes.css">
</head>
<body>

<header>
    <h1>Notes App</h1>
</header>

<main class="container">

    <!-- Form Section -->
    <section class="form-section">
        <input type="text" id="title" placeholder="Enter note title">
        <textarea id="content" placeholder="Write your note..."></textarea>
        <button id="addBtn">Add Note</button>
        <p id="message"></p>
    </section>

    <!-- Notes Display -->
    <section id="notesContainer" class="notes-grid"></section>

</main>

<script src="notes.js"></script>
</body>
</html>
